<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Analytics</title>
  <style>
    :root {
      --bg:#0b0f1a;--surface:#131929;--border:#1e2d45;--accent:#3b82f6;
      --accent2:#06b6d4;--text:#e2e8f0;--muted:#64748b;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh;}
    header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
    .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;letter-spacing:-0.02em;}
    .logo svg{color:var(--accent);}
    main{max-width:1200px;margin:0 auto;padding:32px;}
    .range-bar{display:flex;gap:6px;margin-bottom:28px;align-items:center;}
    .range-bar span{font-size:12px;color:var(--muted);margin-right:4px;}
    button{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:opacity 0.15s;}
    button:hover{opacity:0.85;}
    .range-btn{background:transparent;color:var(--muted);border:1px solid var(--border);padding:5px 12px;font-size:12px;border-radius:5px;}
    .range-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
    .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:10px;}
    .stat-value{font-size:30px;font-weight:700;letter-spacing:-0.04em;color:var(--text);font-family:var(--mono);}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:6px;}
    .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:28px;}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
    .panel-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:16px;}
    .bar-chart{display:flex;flex-direction:row;align-items:flex-end;height:180px;gap:3px;}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;height:100%;}
    .bar-fill{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;opacity:0.85;}
    .bar-label{font-size:9px;color:var(--muted);font-family:var(--mono);}
    .ring-list{display:flex;flex-direction:column;gap:10px;}
    .ring-item{display:flex;align-items:center;gap:10px;}
    .ring-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .ring-name{flex:1;font-size:13px;color:var(--text);}
    .ring-bar-wrap{flex:2;background:var(--border);border-radius:99px;height:4px;}
    .ring-bar-fill{height:100%;border-radius:99px;}
    .ring-count{font-size:12px;color:var(--muted);font-family:var(--mono);min-width:32px;text-align:right;}
    .tables-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;}
    table{width:100%;border-collapse:collapse;}
    th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);text-align:left;padding:0 0 10px;border-bottom:1px solid var(--border);}
    td{padding:10px 0;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);}
    td:last-child{text-align:right;font-family:var(--mono);color:var(--muted);}
    tr:last-child td{border-bottom:none;}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(59,130,246,0.15);color:var(--accent);}
    .log-panel{overflow-x:auto;}
    .log-table th,.log-table td{white-space:nowrap;padding:8px 12px;}
    .error-msg{color:#f87171;font-size:13px;padding:12px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:6px;}
    .skeleton{background:linear-gradient(90deg,var(--border) 25%,#253352 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    @media(max-width:768px){main{padding:16px;}.charts-row,.tables-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Analytics
  </div>
</header>
<main>
  <div class="range-bar">
    <span>Range:</span>
    <button class="range-btn active" data-days="7">7d</button>
    <button class="range-btn" data-days="30">30d</button>
    <button class="range-btn" data-days="90">90d</button>
    <button class="range-btn" data-days="365">1y</button>
  </div>
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Visits</div><div class="skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">Unique Sessions</div><div class="skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">Avg Time on Page</div><div class="skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">Countries</div><div class="skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
  </div>
  <div class="charts-row">
    <div class="panel"><div class="panel-title">Visits per day</div><div id="daily-chart" style="height:180px;"><div class="skeleton" style="width:100%;height:100%;border-radius:8px;"></div></div></div>
    <div class="panel"><div class="panel-title">Devices</div><div class="ring-list" id="device-list"><div class="skeleton" style="height:16px;width:100%;"></div><div class="skeleton" style="height:16px;width:70%;margin-top:10px;"></div></div></div>
  </div>
  <div class="tables-row">
    <div class="panel"><div class="panel-title">Top Pages</div><div id="pages-table"><div class="skeleton" style="height:120px;width:100%;border-radius:6px;"></div></div></div>
    <div class="panel"><div class="panel-title">Top Countries</div><div id="countries-table"><div class="skeleton" style="height:120px;width:100%;border-radius:6px;"></div></div></div>
  </div>
  <div class="tables-row">
    <div class="panel"><div class="panel-title">Top Referrers</div><div id="referrers-table"><div class="skeleton" style="height:120px;width:100%;border-radius:6px;"></div></div></div>
    <div class="panel"><div class="panel-title">Browsers</div><div class="ring-list" id="browser-list"><div class="skeleton" style="height:16px;width:100%;"></div><div class="skeleton" style="height:16px;width:70%;margin-top:10px;"></div></div></div>
  </div>
  <div class="panel log-panel"><div class="panel-title">Recent visits</div><div id="log-table"><div class="skeleton" style="height:160px;width:100%;border-radius:6px;"></div></div></div>
</main>
<script>
const SB_URL = "https://udnpzhypkhtogmznzkvo.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbnB6aHlwa2h0b2dtem56a3ZvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjE2Nzg0NCwiZXhwIjoyMDk3NzQzODQ0fQ.6VnQ21rO7WlFytXVFfgM9PMpm_41EkGiFJrXb5lIqWM";
let activeDays = 7;

document.querySelectorAll(".range-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeDays = parseInt(btn.dataset.days);
    loadAll();
  });
});

async function sbQuery(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json"},
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadAll() {
  const since = new Date(Date.now() - activeDays * 86400000).toISOString();
  try {
    const rows = await sbQuery(`visits?select=*&created_at=gte.${since}&order=created_at.desc&limit=5000`);
    renderStats(rows);
    renderDailyChart(rows);
    renderRingList("device-list", groupBy(rows,"device"), ["#3b82f6","#06b6d4","#8b5cf6"]);
    renderRingList("browser-list", groupBy(rows,"browser"), ["#3b82f6","#06b6d4","#8b5cf6","#22c55e","#f59e0b"]);
    renderTable("pages-table", groupBy(rows,"page"), ["Page","Visits"]);
    renderTable("countries-table", groupBy(rows,"country"), ["Country","Visits"], true);
    renderTable("referrers-table", groupBy(rows,"referrer"), ["Referrer","Visits"]);
    renderLog(rows.slice(0,50));
  } catch(e) {
    document.getElementById("stats-grid").innerHTML=`<div class="error-msg" style="grid-column:1/-1">Error: ${e.message}</div>`;
  }
}

function groupBy(rows,key) {
  const map={};
  rows.forEach(r=>{const v=r[key]||"Unknown";map[v]=(map[v]||0)+1;});
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

function fmtDuration(ms) {
  if(!ms)return"—";const s=Math.round(ms/1000);
  return s<60?`${s}s`:`${Math.floor(s/60)}m ${s%60}s`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}

function renderStats(rows) {
  const sessions=new Set(rows.map(r=>r.session_id)).size;
  const durations=rows.map(r=>r.duration_ms).filter(Boolean);
  const avgDur=durations.length?Math.round(durations.reduce((a,b)=>a+b,0)/durations.length):0;
  const countries=new Set(rows.map(r=>r.country).filter(Boolean)).size;
  document.getElementById("stats-grid").innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Visits</div><div class="stat-value">${rows.length.toLocaleString()}</div><div class="stat-sub">last ${activeDays} days</div></div>
    <div class="stat-card"><div class="stat-label">Unique Sessions</div><div class="stat-value">${sessions.toLocaleString()}</div><div class="stat-sub">distinct visitors</div></div>
    <div class="stat-card"><div class="stat-label">Avg Time on Page</div><div class="stat-value">${fmtDuration(avgDur)}</div><div class="stat-sub">across ${durations.length} timed sessions</div></div>
    <div class="stat-card"><div class="stat-label">Countries</div><div class="stat-value">${countries}</div><div class="stat-sub">unique countries</div></div>`;
}

function renderDailyChart(rows) {
  const map={};
  for(let i=activeDays-1;i>=0;i--){const d=new Date(Date.now()-i*86400000);map[d.toISOString().slice(0,10)]=0;}
  rows.forEach(r=>{const d=r.created_at.slice(0,10);if(map[d]!==undefined)map[d]++;});
  const entries=Object.entries(map);
  const max=Math.max(...entries.map(e=>e[1]),1);
  const cols=entries.map(([day,count])=>{
    const pct=Math.round((count/max)*100);
    const label=new Date(day).toLocaleDateString(undefined,{month:"numeric",day:"numeric"});
    return `<div class="bar-col" title="${day}: ${count}"><div class="bar-fill" style="height:${pct}%"></div>${activeDays<=30?`<div class="bar-label">${label}</div>`:""}</div>`;
  }).join("");
  document.getElementById("daily-chart").innerHTML=`<div class="bar-chart">${cols}</div>`;
}

function renderRingList(elId,entries,colors) {
  const total=entries.reduce((s,e)=>s+e[1],0)||1;
  const html=entries.slice(0,5).map(([name,count],i)=>{
    const pct=Math.round((count/total)*100);const color=colors[i%colors.length];
    return `<div class="ring-item"><div class="ring-dot" style="background:${color}"></div><div class="ring-name">${name}</div><div class="ring-bar-wrap"><div class="ring-bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="ring-count">${count}</div></div>`;
  }).join("");
  document.getElementById(elId).innerHTML=html||`<span style="color:var(--muted);font-size:13px">No data yet</span>`;
}

function renderTable(elId,entries,headers,isCountry=false) {
  const top=entries.slice(0,8);
  if(!top.length){document.getElementById(elId).innerHTML=`<span style="color:var(--muted);font-size:13px">No data yet</span>`;return;}
  const rows=top.map(([name,count])=>{
    const dn=isCountry?`${countryFlag(name)} ${name}`:(name==="Unknown"?`<span style="color:var(--muted)">direct</span>`:name);
    return `<tr><td>${dn}</td><td>${count.toLocaleString()}</td></tr>`;
  }).join("");
  document.getElementById(elId).innerHTML=`<table><thead><tr><th>${headers[0]}</th><th style="text-align:right">${headers[1]}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderLog(rows) {
  if(!rows.length){document.getElementById("log-table").innerHTML=`<span style="color:var(--muted);font-size:13px">No visits yet.</span>`;return;}
  const trs=rows.map(r=>`<tr><td style="color:var(--muted);font-size:12px">${fmtDate(r.created_at)}</td><td><span class="tag">${r.page||"/"}</span></td><td>${r.country?countryFlag(r.country)+" "+r.country:"—"}</td><td style="color:var(--muted)">${r.device||"—"}</td><td style="color:var(--muted)">${r.browser||"—"}</td><td>${fmtDuration(r.duration_ms)}</td></tr>`).join("");
  document.getElementById("log-table").innerHTML=`<table class="log-table"><thead><tr><th>Time</th><th>Page</th><th>Country</th><th>Device</th><th>Browser</th><th>Duration</th></tr></thead><tbody>${trs}</tbody></table>`;
}

function countryFlag(code) {
  if(!code||code==="Unknown")return"🌐";
  return code.toUpperCase().split("").map(l=>String.fromCodePoint(0x1F1E0-65+l.charCodeAt(0))).join("");
}

loadAll();
</script>
</body>
</html>
