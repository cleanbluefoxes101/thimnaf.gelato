<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Analytics</title>
  <style>
    /* ── Tokens ─────────────────────────────────────── */
    :root {
      --bg:       #0b0f1a;
      --surface:  #131929;
      --border:   #1e2d45;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --good:     #22c55e;
      --warn:     #f59e0b;
      --font:     'Inter', system-ui, sans-serif;
      --mono:     'JetBrains Mono', 'Fira Code', monospace;
    }

    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo svg { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #login-form {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font);
      width: 200px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); opacity: 1; }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }

    /* ── Auth overlay ───────────────────────────────── */
    #auth-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 65px);
      gap: 24px;
      text-align: center;
    }

    #auth-overlay h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    #auth-overlay p { color: var(--muted); max-width: 360px; }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 380px;
    }

    .auth-box label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .auth-box input { width: 100%; }
    .auth-box button { width: 100%; padding: 10px; }

    #auth-error {
      color: #f87171;
      font-size: 13px;
      display: none;
    }

    /* ── Dashboard ──────────────────────────────────── */
    #dashboard { display: none; }

    .range-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      align-items: center;
    }

    .range-bar span {
      font-size: 12px;
      color: var(--muted);
      margin-right: 4px;
    }

    .range-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 5px;
    }

    .range-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Stat cards ─────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text);
      font-family: var(--mono);
    }

    .stat-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Charts row ─────────────────────────────────── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 180px;
      justify-content: flex-end;
    }

    .bar-row {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      flex: 1;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      height: 100%;
    }

    .bar-fill {
      width: 100%;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height 0.4s ease;
      opacity: 0.85;
    }

    .bar-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Donut / ring stat */
    .ring-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ring-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ring-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ring-name {
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }

    .ring-bar-wrap {
      flex: 2;
      background: var(--border);
      border-radius: 99px;
      height: 4px;
    }

    .ring-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .ring-count {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      min-width: 32px;
      text-align: right;
    }

    /* ── Tables row ─────────────────────────────────── */
    .tables-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      text-align: left;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    td:last-child { text-align: right; font-family: var(--mono); color: var(--muted); }
    tr:last-child td { border-bottom: none; }

    .td-flag { font-size: 16px; margin-right: 6px; }

    /* ── Log table ──────────────────────────────────── */
    .log-panel { overflow-x: auto; }

    .log-table th, .log-table td {
      white-space: nowrap;
      padding: 8px 12px;
    }

    .log-table th:first-child, .log-table td:first-child { padding-left: 0; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(59,130,246,0.15);
      color: var(--accent);
    }

    /* ── Loading ─────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #253352 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-msg {
      color: #f87171;
      font-size: 13px;
      padding: 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 6px;
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 768px) {
      main { padding: 16px; }
      .charts-row, .tables-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Analytics
  </div>
  <div class="header-right" id="header-right">
    <!-- filled by JS -->
  </div>
</header>

<main>

  <!-- Auth overlay -->
  <div id="auth-overlay">
    <div class="auth-box">
      <h2>Sign in</h2>
      <p style="color:var(--muted);font-size:13px;margin-bottom:4px;">Use your Supabase credentials to view your analytics.</p>
      <label>Supabase URL</label>
      <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co" />
      <label>Anon Key</label>
      <input type="password" id="sb-key" placeholder="eyJhbGci..." />
      <label>Email</label>
      <input type="text" id="sb-email" placeholder="you@example.com" />
      <label>Password</label>
      <input type="password" id="sb-pass" placeholder="••••••••" />
      <button id="login-btn">Sign in</button>
      <span id="auth-error"></span>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">

    <div class="range-bar">
      <span>Range:</span>
      <button class="range-btn active" data-days="7">7d</button>
      <button class="range-btn" data-days="30">30d</button>
      <button class="range-btn" data-days="90">90d</button>
      <button class="range-btn" data-days="365">1y</button>
    </div>

    <!-- Stat cards -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Visits</div><div class="stat-value skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Unique Sessions</div><div class="stat-value skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Avg. Time on Page</div><div class="stat-value skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Countries</div><div class="stat-value skeleton" style="height:36px;width:80px;">&nbsp;</div></div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="panel">
        <div class="panel-title">Visits per day</div>
        <div id="daily-chart" style="height:180px;display:flex;align-items:center;justify-content:center;">
          <div class="skeleton" style="width:100%;height:100%;border-radius:8px;"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Devices</div>
        <div class="ring-list" id="device-list">
          <div class="skeleton" style="height:16px;width:100%;"></div>
          <div class="skeleton" style="height:16px;width:80%;"></div>
          <div class="skeleton" style="height:16px;width:60%;"></div>
        </div>
      </div>
    </div>

    <!-- Tables -->
    <div class="tables-row">
      <div class="panel">
        <div class="panel-title">Top Pages</div>
        <div id="pages-table"><div class="skeleton" style="height:120px;width:100%;border-radius:6px;"></div></div>
      </div>
      <div class="panel">
        <div class="panel-title">Top Countries</div>
        <div id="countries-table"><div class="skeleton" style="height:120px;width:100%;border-radius:6px;"></div></div>
      </div>
    </div>

    <div class="tables-row">
      <div class="panel">
        <div class="panel-title">Top Referrers</div>
        <div id="referrers-table"><div class="skeleton" style="height:120px;width:100%;border-radius:6px;"></div></div>
      </div>
      <div class="panel">
        <div class="panel-title">Browsers</div>
        <div class="ring-list" id="browser-list">
          <div class="skeleton" style="height:16px;width:100%;"></div>
          <div class="skeleton" style="height:16px;width:80%;"></div>
          <div class="skeleton" style="height:16px;width:60%;"></div>
        </div>
      </div>
    </div>

    <!-- Recent log -->
    <div class="panel log-panel">
      <div class="panel-title">Recent visits</div>
      <div id="log-table"><div class="skeleton" style="height:160px;width:100%;border-radius:6px;"></div></div>
    </div>

  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let SB_URL = "", SB_KEY = "", AUTH_TOKEN = "";
let activeDays = 7;

// ── Auth ──────────────────────────────────────────────────────────────────
document.getElementById("login-btn").addEventListener("click", async () => {
  const url   = document.getElementById("sb-url").value.trim().replace(/\/$/, "");
  const key   = document.getElementById("sb-key").value.trim();
  const email = document.getElementById("sb-email").value.trim();
  const pass  = document.getElementById("sb-pass").value;
  const errEl = document.getElementById("auth-error");

  errEl.style.display = "none";
  document.getElementById("login-btn").disabled = true;

  try {
    const res = await fetch(`${url}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": key },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || "Login failed");

    SB_URL = url;
    SB_KEY = key;
    AUTH_TOKEN = data.access_token;

    document.getElementById("auth-overlay").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("header-right").innerHTML =
      `<span style="font-size:13px;color:var(--muted)">${email}</span>
       <button class="btn-ghost" onclick="signOut()">Sign out</button>`;

    loadAll();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  } finally {
    document.getElementById("login-btn").disabled = false;
  }
});

function signOut() {
  SB_URL = SB_KEY = AUTH_TOKEN = "";
  document.getElementById("auth-overlay").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("header-right").innerHTML = "";
}

// ── Range buttons ─────────────────────────────────────────────────────────
document.querySelectorAll(".range-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeDays = parseInt(btn.dataset.days);
    loadAll();
  });
});

// ── Supabase query helper ─────────────────────────────────────────────────
async function sbQuery(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      "apikey":        SB_KEY,
      "Authorization": `Bearer ${AUTH_TOKEN}`,
      "Content-Type":  "application/json",
    },
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Load all panels ───────────────────────────────────────────────────────
async function loadAll() {
  const since = new Date(Date.now() - activeDays * 86400000).toISOString();

  try {
    // Fetch raw visit rows for the period
    const rows = await sbQuery(
      `visits?select=*&created_at=gte.${since}&order=created_at.desc&limit=5000`
    );

    renderStats(rows);
    renderDailyChart(rows);
    renderRingList("device-list",  groupBy(rows, "device"),  ["#3b82f6","#06b6d4","#8b5cf6"]);
    renderRingList("browser-list", groupBy(rows, "browser"), ["#3b82f6","#06b6d4","#8b5cf6","#22c55e","#f59e0b"]);
    renderTable("pages-table",     groupBy(rows, "page"),     ["Page","Visits"]);
    renderTable("countries-table", groupBy(rows, "country"),  ["Country","Visits"], true);
    renderTable("referrers-table", groupBy(rows, "referrer"), ["Referrer","Visits"]);
    renderLog(rows.slice(0, 50));
  } catch (e) {
    document.getElementById("stats-grid").innerHTML =
      `<div class="error-msg" style="grid-column:1/-1">Error loading data: ${e.message}</div>`;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────
function groupBy(rows, key) {
  const map = {};
  rows.forEach(r => {
    const val = r[key] || "Unknown";
    map[val] = (map[val] || 0) + 1;
  });
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}

function fmtDuration(ms) {
  if (!ms) return "—";
  const s = Math.round(ms / 1000);
  if (s < 60) return `${s}s`;
  return `${Math.floor(s/60)}m ${s%60}s`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleString(undefined, {
    month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
  });
}

// ── Render stat cards ─────────────────────────────────────────────────────
function renderStats(rows) {
  const sessions = new Set(rows.map(r => r.session_id)).size;
  const durations = rows.map(r => r.duration_ms).filter(Boolean);
  const avgDur = durations.length
    ? Math.round(durations.reduce((a,b)=>a+b,0) / durations.length)
    : 0;
  const countries = new Set(rows.map(r => r.country).filter(Boolean)).size;

  document.getElementById("stats-grid").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Visits</div>
      <div class="stat-value">${rows.length.toLocaleString()}</div>
      <div class="stat-sub">last ${activeDays} days</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Unique Sessions</div>
      <div class="stat-value">${sessions.toLocaleString()}</div>
      <div class="stat-sub">distinct visitors</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg. Time on Page</div>
      <div class="stat-value">${fmtDuration(avgDur)}</div>
      <div class="stat-sub">across ${durations.length} timed sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Countries</div>
      <div class="stat-value">${countries}</div>
      <div class="stat-sub">unique countries</div>
    </div>
  `;
}

// ── Render daily bar chart ────────────────────────────────────────────────
function renderDailyChart(rows) {
  // Build day buckets
  const map = {};
  for (let i = activeDays - 1; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    map[d.toISOString().slice(0,10)] = 0;
  }
  rows.forEach(r => {
    const d = r.created_at.slice(0,10);
    if (map[d] !== undefined) map[d]++;
  });
  const entries = Object.entries(map);
  const max = Math.max(...entries.map(e => e[1]), 1);

  const cols = entries.map(([day, count]) => {
    const pct = Math.round((count / max) * 100);
    const label = activeDays <= 14
      ? new Date(day).toLocaleDateString(undefined, { month:"numeric", day:"numeric" })
      : new Date(day).toLocaleDateString(undefined, { month:"short", day:"numeric" });
    return `
      <div class="bar-col" title="${day}: ${count} visits">
        <div class="bar-fill" style="height:${pct}%"></div>
        ${activeDays <= 30 ? `<div class="bar-label">${label.split('/').slice(0,2).join('/')}</div>` : ""}
      </div>`;
  }).join("");

  document.getElementById("daily-chart").innerHTML =
    `<div class="bar-chart" style="flex-direction:row;align-items:flex-end;height:180px;">${cols}</div>`;
}

// ── Render ring/bar list ──────────────────────────────────────────────────
function renderRingList(elId, entries, colors) {
  const total = entries.reduce((s, e) => s + e[1], 0) || 1;
  const top = entries.slice(0, 5);
  const html = top.map(([name, count], i) => {
    const pct = Math.round((count / total) * 100);
    const color = colors[i % colors.length];
    return `
      <div class="ring-item">
        <div class="ring-dot" style="background:${color}"></div>
        <div class="ring-name">${name}</div>
        <div class="ring-bar-wrap">
          <div class="ring-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="ring-count">${count}</div>
      </div>`;
  }).join("");
  document.getElementById(elId).innerHTML = html || `<span style="color:var(--muted);font-size:13px">No data yet</span>`;
}

// ── Render simple table ───────────────────────────────────────────────────
function renderTable(elId, entries, headers, isCountry = false) {
  const top = entries.slice(0, 8);
  if (!top.length) {
    document.getElementById(elId).innerHTML = `<span style="color:var(--muted);font-size:13px">No data yet</span>`;
    return;
  }
  const rows = top.map(([name, count]) => {
    const displayName = isCountry
      ? `<span class="td-flag">${countryFlag(name)}</span>${name}`
      : (name === "Unknown" ? `<span style="color:var(--muted)">direct</span>` : name);
    return `<tr><td>${displayName}</td><td>${count.toLocaleString()}</td></tr>`;
  }).join("");
  document.getElementById(elId).innerHTML = `
    <table>
      <thead><tr><th>${headers[0]}</th><th style="text-align:right">${headers[1]}</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Render log ────────────────────────────────────────────────────────────
function renderLog(rows) {
  if (!rows.length) {
    document.getElementById("log-table").innerHTML = `<span style="color:var(--muted);font-size:13px">No visits recorded yet.</span>`;
    return;
  }
  const trs = rows.map(r => `
    <tr>
      <td style="color:var(--muted);font-size:12px">${fmtDate(r.created_at)}</td>
      <td><span class="tag">${r.page || "/"}</span></td>
      <td>${r.country ? countryFlag(r.country) + " " + r.country : "—"}</td>
      <td style="color:var(--muted)">${r.device || "—"}</td>
      <td style="color:var(--muted)">${r.browser || "—"}</td>
      <td>${fmtDuration(r.duration_ms)}</td>
    </tr>`).join("");
  document.getElementById("log-table").innerHTML = `
    <table class="log-table">
      <thead>
        <tr>
          <th>Time</th><th>Page</th><th>Country</th><th>Device</th><th>Browser</th><th>Duration</th>
        </tr>
      </thead>
      <tbody>${trs}</tbody>
    </table>`;
}

// ── Country → flag emoji ──────────────────────────────────────────────────
function countryFlag(code) {
  if (!code || code === "Unknown") return "🌐";
  const letters = code.toUpperCase().split("");
  return letters.map(l => String.fromCodePoint(0x1F1E0 - 65 + l.charCodeAt(0))).join("");
}
